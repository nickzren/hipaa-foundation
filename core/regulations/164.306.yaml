authoritative_text: |
  (a) General requirements. Covered entities and business associates must:
  (1) Ensure the confidentiality, integrity, and availability of all ePHI
  the covered entity or business associate creates, receives, maintains, or
  transmits. (2) Protect against any reasonably anticipated threats or
  hazards to the security or integrity of such information. (3) Protect
  against any reasonably anticipated uses or disclosures of such information
  that are not permitted or required under subpart E. (4) Ensure compliance
  by its workforce.

  (b) Flexibility of approach. Covered entities and business associates may
  use any security measures that allow the covered entity or business
  associate to reasonably and appropriately implement the standards and
  implementation specifications as specified in this subpart.
  In deciding which security measures to use, a covered entity or business
  associate must take into account: (i) The size, complexity, and
  capabilities of the covered entity or business associate. (ii) The
  covered entity's or business associate's technical infrastructure,
  hardware, and software security capabilities. (iii) The costs of security
  measures. (iv) The probability and criticality of potential risks to ePHI.

  (c) Standards. A covered entity or business associate must comply with the
  applicable standards as provided in this section and in 164.308, 164.310,
  164.312, 164.314, and 164.316 with respect to all ePHI.

  (d) Implementation specifications. In this subpart:
  (1) Implementation specifications are either required or addressable.
  If an implementation specification is required, the word "Required" appears
  after the title. If an implementation specification is addressable, the
  word "Addressable" appears after the title.
  (2) When a standard adopted in 164.308, 164.310, 164.312, 164.314, or
  164.316 includes required implementation specifications, a covered entity
  or business associate must implement the implementation specifications.
  (3) When a standard adopted in 164.308, 164.310, 164.312, 164.314, or
  164.316 includes addressable implementation specifications, a covered
  entity or business associate must: (i) Assess whether each implementation
  specification is a reasonable and appropriate safeguard in its environment,
  when analyzed with reference to the likely contribution to protecting
  ePHI; and (ii) As applicable, implement the specification if reasonable
  and appropriate; or (A) If implementing the specification is not
  reasonable and appropriate, document why it would not be reasonable and
  appropriate to implement the specification; and (B) Implement an
  equivalent alternative measure if reasonable and appropriate.

  (e) Maintenance. A covered entity or business associate must review and
  modify the security measures implemented under this subpart as needed to
  continue provision of reasonable and appropriate protection of ePHI, and
  update security measures as described in 164.306(b).
ocr_guidance:
  summary: >
    OCR expects covered entities and business associates to apply a
    risk-based, scalable approach. The flexibility-of-approach provision
    means there is no single mandated technology, but the chosen measures
    must be reasonable and appropriate given the entity's risk profile.
    For addressable specifications, OCR expects documented decisions,
    not blanket opt-outs.
  source_document: "HIPAA Security Rule, 45 CFR Part 164 Subpart C"
repo_interpretation:
  plain_english_summary: >
    Section 164.306 sets the overarching framework for the Security Rule.
    It establishes four general requirements (CIA of ePHI, threat
    protection, impermissible use protection, workforce compliance),
    allows flexibility in choosing security measures based on
    organizational factors, distinguishes required from addressable
    implementation specifications, and requires ongoing maintenance.
  intent: >
    Establish the risk-based, scalable compliance framework that governs
    all Security Rule standards and implementation specifications.
  applicability: >
    Applies to every covered entity and business associate that creates,
    receives, maintains, or transmits ePHI. This section frames the
    assessment of every other Security Rule standard.
  common_gaps:
    - No documented rationale for addressable specification decisions.
    - Addressable specifications treated as optional rather than requiring analysis.
    - Flexibility of approach used to justify minimal controls without documented risk analysis.
    - Security measures not reviewed or updated after significant changes.
  remediation_suggestions:
    - Document addressable specification decisions with risk-based rationale.
    - Establish a periodic review cycle for security measures.
    - Ensure flexibility-of-approach decisions reference size, complexity, cost, and risk factors.
evidence_expectations:
  in_repo: []
  external:
    - Risk analysis documentation.
    - Addressable specification decision records.
    - Security measure review and maintenance records.
  review_questions:
    - Are addressable specification decisions documented with rationale?
    - Does the organization consider all four flexibility factors when selecting security measures?
    - Is there evidence of periodic security measure review and maintenance?
