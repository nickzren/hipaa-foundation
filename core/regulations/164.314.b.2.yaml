implementation_type: required
parent_standard: "164.314(b)(1)"
authoritative_text: |
  The plan documents of the group health plan must be amended to
  incorporate provisions to require the plan sponsor to: (i) Implement
  administrative, physical, and technical safeguards that reasonably and
  appropriately protect the confidentiality, integrity, and availability
  of the electronic protected health information that it creates, receives,
  maintains, or transmits on behalf of the group health plan.
  (ii) Ensure that the adequate separation required by 164.504(f)(2)(iii)
  is supported by reasonable and appropriate security measures.
  (iii) Ensure that any agent to whom it provides this information agrees
  to implement reasonable and appropriate security measures to protect the
  information. (iv) Report to the group health plan any security incident
  of which it becomes aware.
ocr_guidance:
  summary: >
    OCR requires group health plan documents to include all four
    provisions: implementation of administrative, physical, and technical
    safeguards; adequate separation supported by security measures;
    agent compliance; and security incident reporting. These provisions
    ensure the plan sponsor protects ePHI at a level consistent with
    the Security Rule.
  source_document: "HIPAA Security Rule, 45 CFR Part 164 Subpart C"
repo_interpretation:
  plain_english_summary: >
    Group health plan documents must be amended to require the plan
    sponsor to: (i) implement administrative, physical, and technical
    safeguards for ePHI; (ii) support adequate separation with security
    measures; (iii) ensure agents implement reasonable security measures;
    and (iv) report security incidents to the group health plan.
  intent: >
    Ensure plan sponsors are contractually bound to protect ePHI through
    plan document amendments that mirror Security Rule obligations.
  applicability: >
    Applies to group health plans where the plan sponsor receives ePHI
    beyond the limited exceptions in 164.504(f)(1)(ii)/(iii) and
    164.508. Not applicable to entities that are not group health plans.
  common_gaps:
    - Plan documents not amended to include Security Rule provisions.
    - Plan document amendments missing one or more of the four required provisions.
    - Adequate separation requirement not addressed with security measures.
    - Agent compliance flow-down not included.
  remediation_suggestions:
    - Amend plan documents to include all four required provisions.
    - Review adequate separation implementation for security measure support.
    - Establish agent compliance requirements and security incident reporting procedures.
evidence_expectations:
  in_repo: []
  external:
    - Amended plan documents containing all four required provisions.
    - Evidence of adequate separation supported by security measures.
    - Agent agreements or acknowledgments regarding security measures.
    - Security incident reporting procedures for the plan sponsor.
  review_questions:
    - Do plan documents include all four required provisions?
    - Is adequate separation supported by documented security measures?
    - Are agents required to implement reasonable security measures?
    - Is there a security incident reporting process from plan sponsor to group health plan?
