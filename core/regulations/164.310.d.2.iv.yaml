---
schema_version: v1
regulation_id: "164.310(d)(2)(iv)"
title: "Data Backup and Storage"
rule_family: security_rule
safeguard_type: physical
standard_or_spec: implementation_specification
implementation_type: addressable
parent_standard: "164.310(d)(1)"
addressable_assessment_guidance: |
  Assess whether the entity has evaluated the need to create retrievable,
  exact copies of ePHI before media movement based on its risk analysis.
  If so, evaluate whether the backup and storage procedures are reasonable
  and appropriate. Document the disposition: implemented, alternative,
  documented_exception, or not_evidenced.
authoritative_text: |
  Create a retrievable, exact copy of electronic protected health information,
  when needed, before movement of equipment.
ocr_guidance:
  summary: "Before moving equipment, entities should create a retrievable exact copy of any ePHI stored on that equipment."
  source_document: "HIPAA Security Series: Security Standards - Physical Safeguards"
repo_interpretation:
  plain_english_summary: "Before moving hardware that contains ePHI, back up the data so you have a retrievable copy in case anything goes wrong during the move."
  intent: "Prevent data loss when hardware is relocated, shipped, or transferred by ensuring a backup exists that can restore the ePHI if the equipment is damaged, lost, or stolen in transit."
  applicability: "Any equipment movement scenario where ePHI is on the device — server relocation, laptop shipment, media transfer between facilities, and equipment sent for repair or decommission."
  common_gaps:
    - "No pre-movement backup requirement documented"
    - "Backup performed but not verified as retrievable"
    - "Laptop and portable device moves not covered by backup requirements"
    - "Equipment sent for repair without prior backup"
    - "Cloud migration treated differently without documented rationale"
  remediation_suggestions:
    - "Add a pre-movement backup step to the equipment relocation procedure"
    - "Verify backup integrity and retrievability before authorizing the move"
    - "Include portable devices in the pre-movement backup scope"
    - "Document backup requirements for equipment sent for repair"
    - "If cloud-based, document the risk-based rationale for any modified approach"
evidence_expectations:
  in_repo:
    - "Pre-movement backup procedure"
    - "Data backup and storage policy"
  external:
    - "Backup logs from equipment relocation events"
    - "Backup verification and restore test records"
    - "Equipment move authorization forms showing backup confirmation"
  review_questions:
    - "Is there a procedure requiring data backup before equipment movement?"
    - "Are backups verified as retrievable before movement proceeds?"
    - "Does the procedure cover portable devices and equipment sent for repair?"
    - "Can the entity demonstrate backup completion for recent equipment moves?"
related_requirements:
