title: "Access of individuals to protected health information"
rule_family: privacy_rule
safeguard_type: null
standard_or_spec: standard
implementation_type: null
parent_standard: null
authoritative_text: |
  (a) Standard: Access to protected health information.
  (1) An individual has a right of access to inspect and obtain a copy of
  protected health information about the individual in a designated record
  set, for as long as the PHI is maintained in the designated record set,
  with limited exceptions.

  (2) Unreviewable grounds for denial: A covered entity may deny access
  without providing the individual an opportunity for review in the
  following circumstances:
  (i) Psychotherapy notes;
  (ii) Information compiled in reasonable anticipation of litigation;
  (iii) PHI maintained by a covered entity that is subject to the CLIA
        if access would be prohibited by CLIA;
  (iv) Information from certain correctional institution or research
       contexts.

  (3) Reviewable grounds for denial: A covered entity may deny access,
  provided the individual is given a right to have such denial reviewed,
  if a licensed health care professional has determined that access is
  reasonably likely to endanger the life or physical safety of the
  individual or another person, or is reasonably likely to cause
  substantial harm to a person referenced in the information.

  (b) Implementation specifications.
  (1) The covered entity must act on a request for access no later than
  30 days after receipt (with one 30-day extension if the entity cannot
  comply within 30 days, provided written notice of the extension is
  given).

  (2) Providing access: If access is granted, the covered entity must
  provide the individual with access to the PHI in the form and format
  requested by the individual, if it is readily producible in such form
  and format; if not, in a readable hard copy form or such other form
  as agreed to by the entity and the individual.

  (3) If the PHI is maintained electronically, the individual has the
  right to obtain a copy in electronic form and format. The individual
  may also direct the covered entity to transmit the copy directly to
  another person designated by the individual.

  (4) Fees: The covered entity may impose a reasonable, cost-based fee
  that includes only the cost of copying (labor for creating the copy),
  supplies, postage, and preparing an explanation or summary if agreed
  to by the individual. The fee may not include costs associated with
  searching for or retrieving the PHI.

  (5) Denial: If access is denied in whole or in part, the covered entity
  must provide a timely written denial that is in plain language, contains
  the basis for the denial, a statement of the individual's review rights,
  and a description of how the individual may complain to the entity or
  the Secretary.
ocr_guidance:
  summary: >
    Section 164.524 establishes the individual right of access, which OCR
    has identified as an enforcement priority. OCR has pursued numerous
    enforcement actions for access right violations, including failure to
    provide timely access, excessive fees, and refusal to provide
    electronic copies. The Right of Access Initiative, launched in 2019,
    has resulted in significant settlements. OCR guidance emphasizes that
    the fee must be reasonable and cost-based, electronic copies must be
    available for ePHI, and the 30-day timeline is a maximum, not a
    target.
  source_document: "HHS Right of Access Initiative; HHS Guidance on Access Rights"
repo_interpretation:
  plain_english_summary: >
    Individuals have the right to inspect and obtain a copy of their PHI
    in a designated record set. Covered entities must respond within 30
    days (with one possible 30-day extension). If PHI is electronic, the
    individual can request an electronic copy and can direct that the copy
    be sent to a third party. Fees must be reasonable and cost-based (no
    search/retrieval fees). Access may be denied only for specific reasons,
    and reviewable denials must include a review opportunity.
  intent: >
    Empower individuals to access their own health information, promoting
    transparency and enabling individuals to participate in their care.
    The electronic access right ensures that digitization of health records
    benefits individuals, not just covered entities.
  applicability: >
    Applies to all covered entities maintaining designated record sets.
    Directly relevant for EHR systems, patient portals, health information
    exchanges, health plan member portals, and any system providing patient
    data access. This is an OCR enforcement priority area.
  common_gaps:
    - No individual access request workflow or tracking.
    - Access requests not fulfilled within 30 days.
    - Excessive or non-cost-based fees charged for copies.
    - Electronic copies not available despite PHI being maintained electronically.
    - Third-party transmittal (individual-directed access) not supported.
    - No process for denial with required written denial elements.
    - Patient portal access does not cover the full designated record set.
    - No process for access review when denial is on reviewable grounds.
  remediation_suggestions:
    - Implement an access request intake, tracking, and fulfillment workflow.
    - Ensure fulfillment within 30 days with extension notification procedures.
    - Develop a fee schedule that is reasonable and cost-based per OCR guidance.
    - Enable electronic copy delivery in the format requested by the individual.
    - Implement third-party directed access (transmittal to designee).
    - Build denial procedures with required written denial elements and review process.
    - Ensure patient portals provide access to the full designated record set.
    - Train workforce on access right requirements including OCR enforcement priorities.
evidence_expectations:
  in_repo:
    - Patient portal or data access API providing individual access to PHI.
    - Data export functionality supporting requested formats.
    - Third-party transmittal or directed access features.
    - Access request tracking and workflow implementation.
    - Designated record set definition and system mapping.
  external:
    - Access request intake forms and procedures.
    - Access request tracking log with fulfillment dates.
    - Fee schedule.
    - Denial procedures and denial letter templates.
    - Policy defining designated record set scope.
    - Training materials on individual access rights.
    - Evidence of compliance with 30-day timeline.
  review_questions:
    - Can individuals request and receive copies of their PHI from the designated record set?
    - Are access requests fulfilled within 30 days?
    - Are electronic copies available for ePHI?
    - Does the system support individual-directed access to third parties?
    - Is the fee schedule reasonable and cost-based?
    - Are denial procedures documented with all required elements?
    - Does the patient portal cover the full designated record set?
