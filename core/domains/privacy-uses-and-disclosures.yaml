  implementation_specifications: []
assessment_guidance:
  domain_specific_pitfalls:
    - "Treating a general privacy policy as a HIPAA-compliant Notice of Privacy Practices."
    - "No mechanism to distinguish permitted from impermissible disclosures in the system."
    - "Data sharing pathways not documented or governed."
  escalation_triggers:
    - "System discloses PHI to third parties with no legal basis or authorization."
    - "De-identification claimed but neither Expert Determination nor Safe Harbor method documented."
  repo_only_notes: |
    Privacy Rule uses and disclosures are heavily organizational. Notice of
    privacy practices, authorization forms, and use/disclosure logs are almost
    always external evidence. On repo-only evidence, data access patterns,
    disclosure endpoints, consent checks, and data sharing configurations are
    the strongest signals. Technical use/disclosure controls in code are
    meaningful evidence for the technical dimension of this domain.
status: draft
