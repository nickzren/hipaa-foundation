assessment_guidance:
  domain_specific_pitfalls:
    - "Treating TLS in transit as complete encryption coverage when data at rest is unencrypted."
    - "Assuming cloud provider controls fully satisfy entity-level technical safeguard obligations."
    - "Audit logs exist but are never reviewed."
  escalation_triggers:
    - "No audit logging implementation found in code or infrastructure."
    - "Authentication bypassed for internal services accessing ePHI."
    - "No encryption at rest and no documented addressable-spec disposition."
  repo_only_notes: |
    Technical safeguards are often the strongest evidence in repo-only reviews.
    Authentication, access control logic, encryption configuration, and audit
    logging are directly observable in code and infrastructure. Encryption
    disposition (164.312(a)(2)(iv) and 164.312(e)(2)(ii)) is addressable —
    document the disposition. Audit log review records and penetration test
    results are the most common items requiring external evidence.
status: draft
