  - "164.312(c)(2)"
  - "164.312(d)"
  - "164.312(e)(1)"
  - "164.312(e)(2)(i)"
  - "164.312(e)(2)(ii)"
regulation_files:
  standards:
    - core/regulations/164.312.a.1.yaml
    - core/regulations/164.312.b.yaml
    - core/regulations/164.312.c.1.yaml
