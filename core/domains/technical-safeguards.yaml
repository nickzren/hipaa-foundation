---
schema_version: v1
id: technical-safeguards
title: Technical Safeguards
rule_family: security_rule
lifecycle_phase:
  - assessment
  - operation
review_questions:
  - Are access controls implemented with unique user identification?
  - Is ePHI encrypted in transit and at rest?
  - Are audit controls in place to record and examine ePHI access?
deep_assessment_probes:
  - Does automatic logoff apply to all systems accessing ePHI?
  - Are integrity controls in place to prevent unauthorized alteration of ePHI?
  - Is person or entity authentication implemented for ePHI access?
expected_evidence:
  in_repo:
    - authentication implementation
    - access control logic
    - encryption configuration
    - audit logging code
    - session management
  external:
    - penetration test results
    - encryption key management evidence
    - audit log review records
common_gaps:
  - Encryption at rest not implemented or not documented.
  - Audit logs exist but are never reviewed.
  - Automatic logoff not configured for all ePHI access points.
cross_links:
  - risk-analysis-and-management
  - administrative-safeguards
  - physical-safeguards
regulation_ids:
  - "164.312(a)(1)"
  - "164.312(a)(2)(i)"
  - "164.312(a)(2)(ii)"
  - "164.312(a)(2)(iii)"
  - "164.312(a)(2)(iv)"
