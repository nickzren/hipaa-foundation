---
schema_version: v1
id: administrative-safeguards
title: Administrative Safeguards
rule_family: security_rule
lifecycle_phase:
  - assessment
  - operation
review_questions:
  - Is there a security management process with assigned responsibility?
  - Are workforce security and information access management controls in place?
  - Is there a contingency plan?
deep_assessment_probes:
  - Is there a designated security official per 164.308(a)(2)?
  - Are workforce clearance and termination procedures implemented?
  - Does the contingency plan include data backup, disaster recovery, and emergency mode operation?
expected_evidence:
  in_repo:
    - access provisioning and deprovisioning automation
    - incident response configuration
    - backup and recovery scripts
  external:
    - security officer designation
    - workforce clearance procedures
    - contingency plan and test results
    - incident response plan
common_gaps:
  - No designated security official.
  - Workforce termination does not include timely access revocation.
  - Contingency plan exists but has never been tested.
