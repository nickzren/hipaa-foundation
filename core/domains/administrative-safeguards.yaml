assessment_guidance:
  domain_specific_pitfalls:
    - "Treating cloud IAM configuration as a complete administrative safeguard program."
    - "No designated security official despite organizational maturity."
    - "Contingency plan exists in documentation but has never been tested."
  escalation_triggers:
    - "Workforce termination does not include timely access revocation."
    - "No contingency plan or data backup plan exists."
    - "No incident response procedure despite handling ePHI."
  repo_only_notes: |
    Many administrative safeguards are organizational controls. Security officer
    designation, workforce clearance procedures, contingency plan test results,
    and incident response execution evidence are typically external. On repo-only
    evidence, access provisioning automation, backup scripts, and incident alerting
    configuration are the strongest available signals. Risk analysis is assessed
    in its own domain — do not double-count here.
