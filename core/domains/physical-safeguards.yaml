---
schema_version: v1
id: physical-safeguards
title: Physical Safeguards
rule_family: security_rule
lifecycle_phase:
  - assessment
  - operation
review_questions:
  - Are facility access controls in place for systems that store or process ePHI?
  - Are workstation use and security policies implemented?
  - Are device and media controls implemented for ePHI disposal and reuse?
deep_assessment_probes:
  - How does the entity handle physical access to data centers or server rooms?
  - Are portable devices that access ePHI encrypted and managed?
  - Is media destruction or sanitization documented?
expected_evidence:
  in_repo:
    - device management scripts
    - workstation configuration automation
    - media handling in deployment or decommission scripts
  external:
    - facility security plan
    - physical access logs
    - media destruction certificates
    - workstation use policies
common_gaps:
  - Cloud provider physical security assumed without documented shared responsibility.
  - Portable device encryption not enforced.
  - Media disposal not documented for decommissioned hardware.
cross_links:
  - technical-safeguards
  - administrative-safeguards
regulation_ids:
