assessment_guidance:
  domain_specific_pitfalls:
    - "Assuming cloud provider physical security fully satisfies entity-level physical safeguard obligations."
    - "Portable device encryption not enforced organization-wide."
    - "Media disposal not documented for decommissioned hardware."
  escalation_triggers:
    - "No facility access controls and entity operates its own data center."
    - "Portable devices with ePHI are unencrypted and unmanaged."
  repo_only_notes: |
    For cloud-hosted systems, physical safeguards shift significantly to the
    provider. Note the shared responsibility model. Facility security plans,
    physical access logs, and media destruction certificates are almost always
    external evidence. On repo-only evidence, device management scripts and
    workstation configuration automation are the strongest signals. Addressable
    specs in physical safeguards still require documented disposition even when
    cloud-hosted.

    For cloud-only systems with no entity-operated facilities documented in
    the corpus, Not assessed is often the appropriate default on repo-only
    evidence. An AWS BAA or cloud-provider relationship artifact supports the
    organizational-requirements domain, not the physical-safeguards domain.
    Do not credit a cloud BAA as physical-safeguard evidence for 164.310.
status: draft
